name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck & Build (pull_request)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint app components

      - name: Build
        run: npm run build
