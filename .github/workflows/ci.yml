name: CI

on:
  push:
    branches:
      - dev
      - qa
      - prod
  pull_request:
    branches:
      - dev
      - qa
      - prod
      - main

# Read access to GitHub Packages is granted to the workflow so npm install can
# pull private @juiceco-io/* packages (e.g. @juiceco-io/rum-init). The standard
# GITHUB_TOKEN is used for auth — no PATs required.
permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@juiceco-io'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
